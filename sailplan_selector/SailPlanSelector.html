<!DOCTYPE html>
<!-- Pelican Sail Plan Selector -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sail Plan Selector — Pelican</title>
<style>
  :root{
    --primary:#1A365D; --secondary:#2B6CB0; --accent:#D69E2E;
    --dark:#2D3748; --light:#F7FAFC; --border:#E2E8F0;
    --danger:#9B2C2C; --success:#2F855A;
    --c-r1:#2F855A; --c-r2:#319795; --c-r3:#2B6CB0; --c-r4:#6B46C1; --c-r5:#D69E2E;
    --c-r6:#E53E3E; --c-r7:#3182CE; --c-r8:#4A5568; --c-r9:#805AD5; --c-r10:#DD6B20;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#EDF2F7;color:var(--dark);line-height:1.4;
    -webkit-text-size-adjust:100%;}
  .wrap{max-width:760px;margin:0 auto;background:#fff;min-height:100%;
    display:flex;flex-direction:column;}

  header{background:var(--primary);color:#fff;padding:10px 16px;
    display:flex;align-items:baseline;flex-wrap:wrap;gap:4px 8px;border-bottom:2px solid var(--accent);}
  header h1{font-size:1.05em;font-weight:700;}
  header .sub{font-size:.72em;opacity:.85;}
  header .disclaimer{flex-basis:100%;font-size:.66em;line-height:1.3;opacity:.75;
    font-weight:400;color:#FBD38D;cursor:pointer;text-decoration:underline;
    text-decoration-color:rgba(251,211,141,.4);text-underline-offset:2px;}
  header .disclaimer:hover{opacity:1;}
  header .help-btn{margin-left:auto;align-self:center;flex:0 0 auto;
    width:26px;height:26px;border-radius:50%;border:1.5px solid rgba(255,255,255,.6);
    background:transparent;color:#fff;font-weight:700;font-size:.95em;line-height:1;
    cursor:pointer;}
  header .help-btn:hover{background:rgba(255,255,255,.15);}

  .dial-area{padding:10px 12px 4px;display:flex;flex-direction:column;align-items:center;}
  .diagram-wrap{position:relative;width:100%;max-width:min(98vw,688px);aspect-ratio:1;}
  svg#dial{display:block;width:100%;height:100%;touch-action:none;user-select:none;}

  /* configuration patches: angular = point of sail, radial = TWS band.
     Inactive configs show as faint band outlines; the one(s) the puck is
     inside light up (bold outline + soft-filled optimal sub-band). */
  .ring path{transition:fill-opacity .12s,stroke-opacity .12s;
    fill-opacity:0;stroke-opacity:0;stroke-width:1.2;stroke-linejoin:round;}
  .ring .buf{stroke-opacity:.35;}
  .ring.match .buf{stroke-opacity:.9;stroke-width:1.8;}
  .ring.match .swt{fill-opacity:.32;stroke-opacity:.9;stroke-width:2;}
  .ring.match.optimal .swt{fill-opacity:.44;}
  #ringLayer.showall .ring .buf{stroke-opacity:.6;}
  .ring.excluded{opacity:.12;}

  /* hover / press on a card isolates that config on the dial */
  .card{touch-action:none;}
  .cards.focusing .card.on:not(.focus){opacity:.35;}
  #ringLayer.focusing .ring{opacity:.06;}
  #ringLayer.focusing .ring.focus{opacity:1;}
  .ring.focus .buf{stroke-opacity:.95;stroke-width:2;}
  .ring.focus .swt{fill-opacity:.42;stroke-opacity:.95;stroke-width:2;}

  /* chevrons are animated via requestAnimationFrame in JS */
  #puck{cursor:grab;}
  .puckBody{transform-box:fill-box;transform-origin:center;
    animation:puckBreath 2.6s ease-in-out infinite;}
  @keyframes puckBreath{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
  .puckPulse{transform-box:fill-box;transform-origin:center;
    animation:puckPulse 2.6s ease-out infinite;}
  @keyframes puckPulse{0%{transform:scale(1);opacity:.45;}
    70%{opacity:0;}100%{transform:scale(1.75);opacity:0;}}

  .controlbar{display:flex;align-items:center;flex-wrap:wrap;gap:8px 10px;padding:8px 14px 0;}
  .cb-side{flex:1 1 0;display:flex;align-items:center;gap:8px;min-width:0;}
  .cb-right{justify-content:flex-start;}
  .cb-center{display:flex;gap:10px;align-items:center;font-size:.85em;}
  .bft{text-align:left;line-height:1.1;display:flex;flex-direction:column;}
  .bft .bl{font-size:.62em;text-transform:uppercase;letter-spacing:.03em;
    color:#a0aec0;font-weight:700;}
  .bft .bv{font-size:.82em;color:var(--primary);font-weight:600;white-space:nowrap;}
  .chip{background:var(--light);border:1px solid var(--border);border-radius:999px;
    padding:4px 12px;font-weight:600;color:var(--primary);white-space:nowrap;
    min-width:98px;text-align:center;}   /* fixed width so values don't resize the chip */
  .chip b{color:var(--secondary);}

  .toggle{display:inline-flex;align-items:center;gap:6px;font-size:.78em;font-weight:600;
    padding:5px 11px;border-radius:999px;border:1.5px solid var(--border);
    background:#fff;color:#718096;cursor:pointer;}
  .toggle svg{flex:0 0 auto;}
  .toggle.on{background:var(--secondary);border-color:var(--secondary);color:#fff;}
  #nightBtn.on{background:var(--primary);border-color:var(--primary);color:#fff;}
  .hint{font-size:.72em;color:#718096;text-align:center;margin-top:4px;}

  /* SAILS column floats at the bottom-right of the control bar, rising upward, so it
     doesn't push the cards down. Its bottom aligns with the AWA/TWS/Interactive row. */
  .controlbar{position:relative;padding:8px 14px;align-items:flex-end;}   /* symmetric → AWA/TWS center on the diagram centre */
  .sails-wrap{position:absolute;right:14px;bottom:8px;display:flex;flex-direction:column;
    align-items:center;gap:3px;}
  .collbl{font-size:.62em;text-transform:uppercase;letter-spacing:.03em;color:#a0aec0;
    font-weight:700;text-align:center;cursor:pointer;}
  .collbl:hover{color:var(--secondary);}
  .sails-col{display:flex;flex-direction:column;gap:3px;}
  .sailbtn{width:84px;font-size:.66em;font-weight:600;padding:3px 6px;border-radius:5px;
    border:1.5px solid var(--border);background:#fff;color:#718096;cursor:pointer;line-height:1.2;}
  .sailbtn.on{background:var(--secondary);border-color:var(--secondary);color:#fff;}
  /* --- Mobile: stack the control bar so nothing overlaps on narrow screens --- */
  @media(max-width:560px){
    .controlbar{flex-direction:column;align-items:center;gap:10px;}
    .cb-side,.cb-center{flex:0 0 auto;width:auto;justify-content:center;}
    .cb-right{flex-direction:column;gap:8px;}
    .sails-wrap{position:static;}
    .sails-col{flex-direction:row;flex-wrap:wrap;justify-content:center;gap:4px;}
    .sailbtn{width:auto;min-width:64px;}
  }

  /* plan-detail window (replaces the area below the diagram) */
  .detail{display:none;flex-direction:column;margin:8px 14px 16px;border:1px solid var(--border);
    border-radius:8px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.10);min-height:340px;}
  .detail.show{display:flex;}
  .detail-hd{display:flex;align-items:center;gap:8px;padding:9px 12px;color:#fff;
    font-weight:700;font-size:.95em;background:var(--primary);}
  .detail-hd .tag{font-size:.62em;font-weight:700;text-transform:uppercase;color:var(--primary);
    background:#fff;padding:2px 7px;border-radius:3px;}
  .detail-hd .sub2{font-weight:400;opacity:.82;}
  .detail-hd .dx{margin-left:auto;border:none;background:rgba(255,255,255,.18);color:#fff;
    width:24px;height:24px;border-radius:50%;font-size:1.1em;line-height:1;cursor:pointer;}
  .detail-body{padding:14px 16px;overflow-y:auto;}
  .detail-body p{font-size:.86em;color:#4a5568;margin:8px 0;}
  .detail-body .lbl{font-weight:700;color:var(--primary);}
  .detail-body .sails{font-size:.82em;font-weight:600;color:var(--primary);background:#EDF2F7;
    border-radius:4px;padding:7px 9px;margin:4px 0 10px;}
  .detail-body .sr{font-size:.78em;font-weight:600;color:#718096;margin-top:4px;}
  .detail-body .srow{display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap;}
  .detail-body .sweet{font-size:.78em;font-weight:600;color:#718096;text-align:right;}
  .detail-body .warn{font-size:.83em;background:#FFF5F5;border-left:4px solid var(--danger);
    color:#9B2C2C;padding:9px 11px;border-radius:4px;margin-top:10px;}
  .detail-body .reef{font-size:.83em;background:#EBF8FF;border-left:4px solid var(--secondary);
    color:#2C5282;padding:9px 11px;border-radius:4px;margin-top:10px;}
  .detail-body .range{font-size:.78em;color:#718096;margin-top:10px;font-weight:600;}

  /* Cards: fixed 6-slot grid, no reflow as puck moves */
  .cards-head{padding:6px 14px 0;font-size:.78em;color:#718096;}
  .cards-head b{color:var(--primary);}
  .cards{position:relative;display:grid;grid-template-columns:repeat(3,1fr);
    grid-auto-rows:124px;gap:8px;padding:8px 14px 16px;}
  @media(max-width:560px){.cards{grid-template-columns:repeat(2,1fr);}}
  .card{position:relative;border:1px solid var(--border);border-left:5px solid var(--border);
    border-radius:6px;padding:8px 10px 9px 10px;background:#fafbfc;overflow:hidden;
    display:flex;flex-direction:column;cursor:pointer;visibility:hidden;}
  .card.on{visibility:visible;}
  .card.optimal{background:#f0fff4;}
  .card .cname{font-size:.8em;font-weight:700;color:var(--primary);line-height:1.15;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    padding-right:20px;}
  .card .tag{align-self:flex-start;font-size:.6em;font-weight:700;text-transform:uppercase;
    letter-spacing:.04em;color:#fff;padding:1px 6px;border-radius:3px;
    background:var(--secondary);margin:4px 0 3px;}
  .card .tag.optimal{background:var(--success);}
  .card .tag.accent,.sheet .tag.accent{background:var(--accent);}
  .card .tag.danger,.sheet .tag.danger{background:var(--danger);}
  .card .tag.muted,.sheet .tag.muted{background:#718096;}
  .card .setup{font-size:.72em;color:#4a5568;line-height:1.25;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card .sun{position:absolute;top:5px;right:5px;width:15px;height:15px;color:#DD6B20;}
  .card .gear{position:absolute;top:5px;right:5px;width:15px;height:15px;color:#4A5568;}
  .card .ranges{display:grid;grid-template-columns:repeat(3,1fr);gap:1px 6px;
    margin-top:auto;padding-top:5px;border-top:1px solid var(--border);}
  .card .ranges>div{display:flex;flex-direction:column;line-height:1.1;min-width:0;}
  .card .rl{font-size:.55em;text-transform:uppercase;letter-spacing:.03em;
    color:#a0aec0;font-weight:700;}
  .card .rv{font-size:.68em;color:#4a5568;font-weight:600;white-space:nowrap;}
  .card .rv.opt{color:var(--success);}
  .empty-msg{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    text-align:center;color:#a0aec0;font-size:.85em;padding:20px;}
  .cards.none .empty-msg{display:flex;}

  /* Overlay */
  .overlay{position:fixed;inset:0;background:rgba(26,54,93,.55);display:none;
    align-items:center;justify-content:center;padding:16px;z-index:20;}
  .overlay.show{display:flex;}
  .sheet{background:#fff;border-radius:10px;max-width:460px;width:100%;
    max-height:86vh;overflow-y:auto;padding:18px 18px 22px;border-top:5px solid;}
  .sheet h2{font-size:1.05em;color:var(--primary);display:flex;align-items:center;gap:8px;
    margin-bottom:6px;padding-right:26px;}
  .sheet .tag{font-size:.62em;font-weight:700;text-transform:uppercase;color:#fff;
    padding:2px 7px;border-radius:3px;background:var(--secondary);}
  .sheet .tag.optimal{background:var(--success);}
  .sheet .sails{font-size:.8em;font-weight:600;color:var(--primary);background:#EDF2F7;
    border-radius:4px;padding:6px 8px;margin:8px 0;}
  .sheet p{font-size:.85em;color:#4a5568;margin:8px 0;}
  .sheet p .lbl{font-weight:700;color:var(--primary);}
  .sheet .warn{font-size:.82em;background:#FFF5F5;border-left:4px solid var(--danger);
    color:#9B2C2C;padding:9px 11px;border-radius:4px;margin-top:10px;}
  .sheet .range{font-size:.76em;color:#718096;margin-top:10px;font-weight:600;}
  .sheet .close{position:absolute;top:0;right:0;}
  .sheet-hd{position:relative;}
  .x{position:absolute;top:-4px;right:-2px;border:none;background:none;font-size:1.4em;
    color:#a0aec0;cursor:pointer;line-height:1;padding:4px;}
  .dot{width:11px;height:11px;border-radius:3px;flex-shrink:0;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Sail Plan Selector</h1>
    <span class="sub">S/V Pelican · Island Packet 370</span>
    <button class="help-btn" id="helpBtn" aria-label="Help and disclaimer" title="Help &amp; disclaimer">?</button>
    <span class="disclaimer" id="discBtn" role="button" tabindex="0">⚠ For educational use only — not for real-world sailing decisions.</span>
  </header>

  <div class="dial-area">
    <div class="diagram-wrap">
      <svg id="dial" viewBox="0 0 540 540" xmlns="http://www.w3.org/2000/svg">
        <circle cx="270" cy="270" r="235" fill="none" stroke="#E2E8F0" stroke-width="1"/>
        <!-- In-irons / no-go wedge (0° ±35°) -->
        <path d="M270,270 L135.21,77.50 A235,235 0 0 1 404.79,77.50 Z"
              fill="#9B2C2C" opacity="0.07"/>
        <text id="posLabel" x="270" y="104" text-anchor="middle" font-family="sans-serif"
              font-size="10" font-weight="700" fill="var(--secondary)"></text>
        <text id="nogoLabel" x="270" y="120" text-anchor="middle" font-family="sans-serif"
              font-size="10" font-weight="700" fill="#9B2C2C" opacity="0.55">NO-GO ±35°</text>

        <!-- radial point-of-sail spokes (below the patches) -->
        <g stroke="#CBD5E0" stroke-width="1" stroke-dasharray="2,3">
          <line x1="270" y1="35" x2="270" y2="505"/>
          <line x1="35" y1="270" x2="505" y2="270"/>
          <line x1="135" y1="77" x2="405" y2="463"/>
          <line x1="66" y1="152" x2="474" y2="388"/>
          <line x1="63" y1="385" x2="477" y2="155"/>
          <line x1="122" y1="449" x2="418" y2="91"/>
        </g>
        <!-- configuration patches: angular = point of sail, radial = TWS band (built in JS) -->
        <g id="ringLayer"></g>
        <!-- wind-speed (radial) grid + kt labels, drawn above the patches -->
        <g id="speedRings" fill="none" stroke="#CBD5E0" stroke-width="1" stroke-dasharray="3,4"></g>

        <g transform="translate(270,270) scale(0.66)">
          <path d="M0,-55 C14,-22 18,22 14,65 C8,80 -8,80 -14,65 C-18,22 -14,-22 0,-55 Z" fill="#4A5568" stroke="#1A202C" stroke-width="1"/>
          <line x1="0" y1="-25" x2="0" y2="25" stroke="#fff" stroke-width="2.5"/>
        </g>

        <g font-family="sans-serif" font-size="10" font-weight="700" fill="#4A5568">
          <path id="arrow0" d="M270,14 L265,24 L275,24 Z" fill="#9B2C2C"/>
          <text id="lbl0" x="270" y="9" fill="#9B2C2C" text-anchor="middle" font-size="10">WIND 0°</text>
          <text id="lbl90r" x="512" y="274" text-anchor="start">90°</text>
          <text id="lbl90l" x="28" y="274" text-anchor="end">90°</text>
          <text id="lbl180" x="270" y="524" text-anchor="middle">180°</text>
        </g>

        <g id="angleRays" font-family="sans-serif" font-size="15" font-weight="700" fill="var(--secondary)">
          <line id="angleRay1" x1="270" y1="270" x2="270" y2="35" stroke="var(--secondary)" stroke-width="1.5" opacity="0.5"/>
          <text id="angleLabel1" x="270" y="270" text-anchor="middle">100°</text>
          <line id="angleRay2" x1="270" y1="270" x2="270" y2="35" stroke="var(--secondary)" stroke-width="1.5" opacity="0.5" style="display:none"/>
          <text id="angleLabel2" x="270" y="270" text-anchor="middle" style="display:none">100°</text>
        </g>
        <g id="puckGroup">
          <line id="puckLine" x1="270" y1="270" x2="270" y2="200" stroke="var(--secondary)" stroke-width="2" opacity="0.25"/>
          <g id="puckChevrons"></g>
          <g id="puck" transform="translate(270,200)">
            <circle class="puckPulse" r="17" fill="none" stroke="var(--secondary)" stroke-width="2.5"/>
            <g class="puckBody">
              <circle r="17" fill="var(--secondary)" stroke="#fff" stroke-width="3"/>
              <g transform="translate(-10,-10) scale(0.84)" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12.8 19.6A2 2 0 1 0 14 16H2"/><path d="M17.5 8a2.5 2.5 0 1 1 2 4H2"/><path d="M9.8 4.4A2 2 0 1 1 11 8H2"/>
              </g>
            </g>
          </g>
        </g>
        <g id="puckGroup2" style="display:none">
          <line id="puckLine2" x1="270" y1="270" x2="270" y2="200" stroke="var(--secondary)" stroke-width="2" opacity="0.25"/>
          <g id="puckChevrons2"></g>
          <g id="puck2" transform="translate(270,200)">
            <circle class="puckPulse" r="17" fill="none" stroke="var(--secondary)" stroke-width="2.5"/>
            <g class="puckBody">
              <circle r="17" fill="var(--secondary)" stroke="#fff" stroke-width="3"/>
              <g transform="translate(-10,-10) scale(0.84)" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12.8 19.6A2 2 0 1 0 14 16H2"/><path d="M17.5 8a2.5 2.5 0 1 1 2 4H2"/><path d="M9.8 4.4A2 2 0 1 1 11 8H2"/>
              </g>
            </g>
          </g>
        </g>
      </svg>
    </div>

  </div>

  <div class="lower" id="lower">
  <div class="controlbar">
    <div class="cb-side cb-left">
      <button id="interBtn" class="toggle on" aria-pressed="true">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.8 19.6A2 2 0 1 0 14 16H2"/><path d="M17.5 8a2.5 2.5 0 1 1 2 4H2"/><path d="M9.8 4.4A2 2 0 1 1 11 8H2"/></svg><span>Interactive</span>
      </button>
      <button id="nightBtn" class="toggle" aria-pressed="false">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg><span>Night</span>
      </button>
    </div>
    <div class="cb-center">
      <div class="chip">AWA <b><span id="angleVal">100</span>°</b></div>
      <div class="chip">TWS <b><span id="speedVal">12</span> kt</b></div>
    </div>
    <div class="cb-side cb-right">
      <div class="bft"><span class="bl" id="bftForce">Force 4</span><span class="bv" id="bftName">Moderate breeze</span></div>
      <div class="sails-wrap">
        <span class="collbl" id="sailsLabel" title="Toggle all sails on/off">Sails</span>
        <div class="sails-col" id="sailsCol"></div>
      </div>
    </div>
  </div>

  <div class="cards" id="cards">
    <div class="empty-msg" id="emptyMsg"></div>
  </div>
  </div>

  <div class="detail" id="detailWin">
    <div class="detail-hd" id="detailHd"><span id="detailTitle"></span><button class="dx" id="detailClose" aria-label="Close">×</button></div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet" id="sheet"></div>
</div>

<script>
const CX=270,CY=270,MINR=34,MAXR=232,MAXSPD=64,POW=0.6;
const NS='http://www.w3.org/2000/svg';

const configs=[
 {id:1,name:"Full Working Cutter Mode",short:"Full Working Cutter",color:"var(--c-r1)",sweet:[35,90],buffer:[90,140],tws:[4,20],
  sails:"Full Main + 100% Genoa + Full Staysail",
  desc:"Baseline offshore rig. The genoa is primary power while the inner staysail on the self-tacking Hoyt boom accelerates boundary-layer air across the back of the main for maximum slot efficiency (~0.4 kt over 2-sail on a beam reach in 12 kt).",
  ops:"Hoist main, center the traveler. Unfurl genoa and sheet to your point of sail, then unfurl the staysail. Set the Hoyt outhaul for a flat foot.",
  warn:"Past 90° AWA the genoa and main blanket the staysail — it collapses and slats. Roll it away."},
 {id:2,name:"Light-Air Reaching Slot",short:"Light-Air Reaching",color:"var(--c-r2)",sweet:[40,90],buffer:[90,150],tws:[5,18],
  sails:"Full Main + 100% Genoa (staysail furled)",
  desc:"In ultra-light air at wider reaching angles the staysail chokes the main slot and stalls both headsails, so it is rolled away.",
  ops:"Drop the traveler to leeward to open the slot. Furl the staysail fully. Ease the genoa to keep luff flow and play the mainsheet for helm balance.",
  warn:"Pinching under 40° loses lift and slides sideways; falling past 150° collapses the genoa behind the main."},
 {id:3,name:"Balanced Heavy Weather Reach",short:"Heavy Weather Reach",color:"var(--c-r3)",sweet:[35,50],buffer:[50,90],tws:[21,40],
  sails:"Reefed Main + Full Staysail (genoa furled)",
  desc:"For true wind in the high 20s. Furl the genoa; the staysail keeps a low, forward center of effort so the helm balances on a knife edge upwind. Keep heel under 15–18°.",
  ops:"Furl the genoa completely. Drop to Reef 1 or 2 and haul the reef lines tight. The Hoyt boom self-tends the staysail through tacks.",
  warn:"Pushed dead downwind the small sail area can't damp swell — expect heavy rolling."},
 {id:4,name:"Boomless Running Configuration",short:"Boomless Running",color:"var(--c-r4)",sweet:[130,160],buffer:[120,130],tws:[15,30],

const ringLayer=document.getElementById('ringLayer');

function polarPt(a,r,side){const rad=a*Math.PI/180;
  return (CX+side*r*Math.sin(rad)).toFixed(1)+' '+(CY-r*Math.cos(rad)).toFixed(1);}
function sector(a1,a2,rIn,rOut,side){
  const large=(a2-a1)>180?1:0, sOut=side>0?1:0, sIn=side>0?0:1;
  return 'M '+polarPt(a1,rOut,side)+' A '+rOut+' '+rOut+' 0 '+large+' '+sOut+' '+polarPt(a2,rOut,side)+
         ' L '+polarPt(a2,rIn,side)+' A '+rIn+' '+rIn+' 0 '+large+' '+sIn+' '+polarPt(a1,rIn,side)+' Z';
}
function buildRings(){
  configs.forEach(c=>{
    const rIn=radius(c.tws[0]), rOut=radius(c.tws[1]);
    const lo=Math.min(c.sweet[0],c.buffer[0]), hi=Math.max(c.sweet[1],c.buffer[1]);
    const g=document.createElementNS(NS,'g');
    g.setAttribute('class','ring'); g.dataset.ring=c.id;
    // buffer patch (full arc) on both tacks, then sweet patch (optimal arc) on top
    [[-1,'buf',lo,hi],[1,'buf',lo,hi],[-1,'swt',c.sweet[0],c.sweet[1]],[1,'swt',c.sweet[0],c.sweet[1]]]
      .forEach(([side,cls,x1,x2])=>{
        const p=document.createElementNS(NS,'path');
        p.setAttribute('class',cls);
        p.setAttribute('d',sector(x1,x2,rIn,rOut,side));
        p.style.fill=c.color; p.style.stroke=c.color;
        g.appendChild(p);
      });
    ringLayer.appendChild(g);
    groups[c.id]=g;
  });
}

function radius(sp){return MINR+(MAXR-MINR)*Math.pow(Math.max(0,sp)/MAXSPD,POW);}

function movePuck(px,py){
  puck.setAttribute('transform','translate('+px+','+py+')');
  puckLine.setAttribute('x2',px);puckLine.setAttribute('y2',py);
  const bearing=Math.atan2(CY-py,CX-px)*180/Math.PI;   // +x axis toward center
  puckChev.setAttribute('transform','translate('+px+','+py+') rotate('+bearing+')');
  puckState.r=Math.hypot(px-CX,py-CY);
}

function placeInitial(angle,speed){
  const r=radius(speed),rad=angle*Math.PI/180;

}

}
function updatePOS(a){
  if(a==null){ posLabel.style.display='none'; nogoLabel.style.display=''; return; }
  posLabel.textContent=pointOfSail(a);
  posLabel.style.display='';
  nogoLabel.style.display = a<35 ? '' : 'none';
}

// chevron train: flows from puck (x=0) toward center (x=r), pointing at center,
// centered on the line, widening with TWS. Driven by rAF so it tracks the puck live.
function animateChevrons(ts){
  const dt=chevLast?ts-chevLast:16; chevLast=ts;
  chevPhase=(chevPhase+dt*0.032)%CHEV_SPACING;      // ~32 px/s toward center
  const r=puckState.r, span=r-CHEV_START-CHEV_END;
  const h=3+(puckState.tws/MAXSPD)*8;               // half-width grows with wind
  const w=h*0.85;
  const d='M0,'+(-h).toFixed(1)+' L'+w.toFixed(1)+',0 L0,'+h.toFixed(1);
  const count=span>4?Math.min(CHEV.length,Math.ceil(span/CHEV_SPACING)+1):0;
  for(let k=0;k<CHEV.length;k++){
    const el=CHEV[k], el2=CHEV2[k];
    if(k>=count){el.style.display='none';el2.style.display='none';continue;}
    const local=(k*CHEV_SPACING+chevPhase)%span;    // 0..span
    const x=CHEV_START+local;
    const op=Math.max(0,Math.min(1,local/10,(span-local)/10));
    const tf='translate('+x.toFixed(1)+',0)';
    el.setAttribute('transform',tf);el.setAttribute('d',d);el.style.opacity=op;el.style.display='';
    if(mirror){el2.setAttribute('transform',tf);el2.setAttribute('d',d);el2.style.opacity=op;el2.style.display='';}
    else el2.style.display='none';
  }
  requestAnimationFrame(animateChevrons);
}
requestAnimationFrame(animateChevrons);

function matchInfo(c,a,s){
  const inSpeed=s>=c.tws[0]&&s<=c.tws[1];
  const lo=Math.min(c.sweet[0],c.buffer[0]),hi=Math.max(c.sweet[1],c.buffer[1]);
  return {visible:inSpeed&&a>=lo&&a<=hi, optimal:inSpeed&&a>=c.sweet[0]&&a<=c.sweet[1]};
}

// Beaufort force + descriptive name from true wind speed (knots)
const BFT=[[1,0,'Calm'],[4,1,'Light air'],[7,2,'Light breeze'],[11,3,'Gentle breeze'],
  [17,4,'Moderate breeze'],[22,5,'Fresh breeze'],[28,6,'Strong breeze'],[34,7,'Near gale'],
  [41,8,'Gale'],[48,9,'Strong gale'],[56,10,'Storm'],[64,11,'Violent storm']];
function updateBeaufort(kt){
  let f=12,name='Hurricane';
  for(const [lim,ff,nm] of BFT){ if(kt<lim){ f=ff; name=nm; break; } }
  bftForce.textContent='Force '+f;
  bftName.textContent=name;
}

const TAC_TWS={HTg:'8–24 kt',HTs:'20–45 kt',HTm:'12–35 kt',BP:'40+ kt'};
function tCard(key,rank){
  const t=byKey[key];
  return {key,color:t.color,short:t.short,nightOk:true,engine:false,setup:t.sails,tagText:t.tagName,tagClass:t.tagClass,
    tws:TAC_TWS[key],opt:'—',safe:'—',rank,ord:99};
}

function sailOk(c){ return REQ[c.id] ? REQ[c.id].every(s=>sailsOn[s]) : true; }
function allowed(c){ return (!night || !NIGHT_UNSAFE.has(c.id)) && sailOk(c); }

function fillSlot(slot,d){
  slot.el.style.display='';
  slot.el.classList.add('on');
  slot.el.classList.toggle('optimal',d.tagClass==='optimal');
  slot.el.style.borderLeftColor=d.color;
  slot.name.textContent=d.short;
  slot.tag.textContent=d.tagText||'';
  slot.tag.style.display=d.tagText?'':'none';
  slot.tag.className='tag'+(d.tagClass?(' '+d.tagClass):'');
  slot.setup.textContent=d.setup;
  slot.opt.textContent=d.opt;
  slot.safe.textContent=d.safe;
  slot.wind.textContent=d.tws;
  slot.sun.style.display=d.nightOk?'none':'';   // sun = daytime-only (not for shorthanded night)
  slot.gear.style.display=d.engine?'':'none';   // gear = requires the engine
  slot.el.dataset.key=d.key;
}
// Fill `list` into the slots; keep `cells` grid cells present (unused ones stay
// as invisible placeholders so the layout doesn't reflow), hide the rest.
function renderCards(list,cells){
  for(let i=0;i<slots.length;i++){
    const slot=slots[i];
    if(i>=cells){slot.el.style.display='none';slot.el.classList.remove('on','optimal','focus');slot.el.dataset.key='';continue;}
    slot.el.style.display='';
    if(i<list.length) fillSlot(slot,list[i]);
    else{slot.el.classList.remove('on','optimal','focus');slot.el.dataset.key='';}
  }
}

function update(){
  const a=state.angle,s=state.speed;
  angleVal.textContent=a;
  speedVal.textContent=s;
  updateBeaufort(s);

  // all patches stay visible (dim); valid ones light up, night-excluded ones fade
  configs.forEach(c=>{
    const m=matchInfo(c,a,s), ok=allowed(c), g=groups[c.id];
    g.classList.toggle('match',m.visible&&ok);
    g.classList.toggle('optimal',m.optimal&&ok);
    g.classList.toggle('excluded',!ok);
    if(m.visible&&ok) ringLayer.appendChild(g);
  });

  const list=[];
  configs.forEach(c=>{
    const m=matchInfo(c,a,s);
    if(m.visible&&allowed(c))
      list.push({key:'c'+c.id,color:c.color,short:(c.short||c.name),nightOk:!NIGHT_UNSAFE.has(c.id),engine:needsEngine(c),
        setup:c.sails,tagText:m.optimal?'✓ Optimal':'Safe',tagClass:m.optimal?'optimal':'',
        tws:c.tws[0]+'–'+c.tws[1]+' kt',
        opt:c.sweet[0]+'–'+c.sweet[1]+'°',
        safe:Math.min(c.sweet[0],c.buffer[0])+'–'+Math.max(c.sweet[1],c.buffer[1])+'°',
        rank:m.optimal?1:3,ord:c.id});
  });
  // heave-to, bare poles and other no-drive options always sort LAST (high rank)
  // heave-to variants — different sail sets for different wind bands (all sort after the sail plans)
  if(s>=8  && s<=24 && sailsOn.main && sailsOn.genoa) list.push(tCard('HTg',7));   // backed genoa — moderate air
  if(s>=20 && sailsOn.main && sailsOn.stay)           list.push(tCard('HTs',8));   // backed staysail — heavy air / gale
  if(s>=12 && s<=35 && sailsOn.main)                  list.push(tCard('HTm',8.5)); // deep-reefed main alone — marginal fallback
  if(s>=40)  list.push(tCard('BP',9));
  if(list.length===0) list.push(tCard('BP',9));   // nothing else set → bare poles / adrift

  list.sort((x,y)=>x.rank-y.rank||x.ord-y.ord);
  renderCards(list.slice(0,6),6);
}

// Plan details open as an inline "window" that replaces the area below the diagram,
// keeping that plan's curve highlighted on the dial while it's up.
function openSheet(key){
  const c=byKey[key]; if(!c) return;
  const isSail=!!c.sweet;
  let tag,tagClass;
  if(isSail){
    const m=matchInfo(c,state.angle,state.speed);
    tag=m.optimal?'Optimal':(m.visible?'Safe':'Off range');
    tagClass=m.optimal?'optimal':'';
  }else{ tag=c.tagName; tagClass=c.tagClass; }
  const drift=c.drift||(isSail?driftNote[c.id]:'');
  detailHd.style.background=c.color;
  const subt = isSail ? (SUBTITLE[c.id]||'') : (c.name.split(' — ')[1]||'');   // card name leads, descriptor follows
  detailTitle.innerHTML='<b>'+(c.short||c.name)+'</b>'+(subt?' <span class="sub2">— '+subt+'</span>':'')+
    ' <span class="tag '+tagClass+'">'+tag+'</span>';
  let html='<div class="sails"><div class="srow"><span>'+c.sails+'</span>';
  if(isSail) html+='<span class="sweet">Sweet spot '+c.sweet[0]+'–'+c.sweet[1]+'° · Safe '+
    Math.min(c.sweet[0],c.buffer[0])+'–'+Math.max(c.sweet[1],c.buffer[1])+'° · TWS '+c.tws[0]+'–'+c.tws[1]+' kt</span>';
  html+='</div>';
  if(drift) html+='<div class="sr"><span class="lbl">Drift / leeway:</span> '+drift+'</div>';
  html+='</div>'+
    '<p>'+c.desc+'</p>'+
    '<p><span class="lbl">Setup:</span> '+c.ops+'</p>';
  if(isSail&&NITE[c.id]) html+='<p><span class="lbl">Day / night / shorthanded:</span> '+NITE[c.id]+'</p>';
  if(isSail&&REEF[c.id]) html+='<div class="reef"><span class="lbl">Reefing by wind speed:</span> '+REEF[c.id]+'</div>';
  html+='<div class="warn"><span class="lbl">⚠ Hazards:</span> '+c.warn+'</div>';
  detailBody.innerHTML=html;
  // keep this plan's curve highlighted while the window is open
  ringLayer.classList.add('focusing');
  configs.forEach(cc=>groups[cc.id].classList.remove('focus'));
  if(isSail){
    const g=groups[c.id]; g.classList.add('focus'); ringLayer.appendChild(g);
    if(!interactive){
      const ang=(c.sweet[0]+c.sweet[1])/2, spd=(c.tws[0]+c.tws[1])/2;
      placePuckAt(ang,spd); placePuck2(ang,spd); mirror=true; showPuck(true); showPuck2(true);
      updateRays(ang,true); fadeStatic([{angle:ang,side:1},{angle:ang,side:-1}]); updatePOS(ang);
    }
  }
  lower.style.display='none';
  detailWin.classList.add('show');
}
function closeSheet(){
  detailWin.classList.remove('show');
  lower.style.display='';
  clearFocus();
}
detailClose.addEventListener('click',closeSheet);
// tapping/clicking anywhere outside the detail window closes it
document.addEventListener('pointerdown',e=>{
  if(detailWin.classList.contains('show') && !detailWin.contains(e.target)) closeSheet();
});

function closeHelp(){ overlay.classList.remove('show'); }
overlay.addEventListener('click',e=>{if(e.target===overlay)closeHelp();});

function openHelp(){
  sheet.style.borderTopColor='var(--primary)';
  sheet.innerHTML=`
    <div class="sheet-hd"><button class="x" id="closeX">×</button>
    <h2>How to use &middot; Disclaimer</h2></div>
    <p style="color:var(--primary);font-weight:700;margin-top:2px;">Reading the dial</p>

    <p>Each coloured band is a sail configuration. Its <b>angular span</b> is the point-of-sail range it works in, and its <b>inner &amp; outer radius</b> are its wind-speed range. The dashed rings mark wind speed (a non-linear scale so light air isn't cramped near the centre) out to <b>64 kt / hurricane</b> at the rim. Whichever bands the puck sits inside light up. The shaded wedge at the top is the <b>no-go zone</b> (&plusmn;35&deg; of dead upwind).</p>

    <p style="font-size:.72em;color:#a0aec0;text-align:center;margin-top:14px;">© 2026 Eric Cosky</p>`;

document.getElementById('helpBtn').addEventListener('click',openHelp);
document.getElementById('discBtn').addEventListener('click',openHelp);
document.getElementById('discBtn').addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openHelp();}});

// ---- card hover / press: isolate one config on the dial ----
// Hover (mouse) or press-and-hold highlights that config and fades the rest.
// Any movement before release is treated as a scrub (no dialog); moving over
// another card highlights it. A clean tap (press+release, no move) opens details.
let focusKey=null, press=null;
function cardUnder(x,y){const el=document.elementFromPoint(x,y);return el?el.closest('.card.on'):null;}
function focusCard(card){
  if(!card) return;
  focusKey=card.dataset.key;
  cardsEl.classList.add('focusing');
  slots.forEach(s=>s.el.classList.toggle('focus',s.el===card));
  ringLayer.classList.add('focusing');
  configs.forEach(c=>groups[c.id].classList.remove('focus'));
  const isCfg=focusKey&&focusKey[0]==='c';
  if(isCfg){const g=groups[+focusKey.slice(1)];if(g){g.classList.add('focus');ringLayer.appendChild(g);}}
  // in "show all" mode the puck is hidden until you hover a card; then it jumps
  // to that plan's ideal angle & mid-TWS and the chevrons animate.
  if(!interactive&&isCfg){
    const c=cfgById[+focusKey.slice(1)];
    const ang=(c.sweet[0]+c.sweet[1])/2, spd=(c.tws[0]+c.tws[1])/2;
    placePuckAt(ang,spd); placePuck2(ang,spd);
    mirror=true; showPuck(true); showPuck2(true);
    updateRays(ang,true);
    fadeStatic([{angle:ang,side:1},{angle:ang,side:-1}]);
    updatePOS(ang);
  }
}
function clearFocus(){
  focusKey=null;
  cardsEl.classList.remove('focusing');
  slots.forEach(s=>s.el.classList.remove('focus'));
  ringLayer.classList.remove('focusing');
  configs.forEach(c=>groups[c.id].classList.remove('focus'));
  if(!interactive){ showPuck(false); showPuck2(false); mirror=false; hideRays(); fadeStatic([]); }
}

// ---- Interactive / Nighttime mode ----
const interBtn=document.getElementById('interBtn');
const nightBtn=document.getElementById('nightBtn');
function showPuck(v){ puckGroup.style.display=v?'':'none'; }
function showPuck2(v){ puckGroup2.style.display=v?'':'none'; }
function placePuckAt(angle,speed){
  placeInitial(angle,speed);
  angleVal.textContent=Math.round(angle);
  speedVal.textContent=Math.round(speed);
  updateBeaufort(speed);
}
function offCards(){
  return configs.filter(allowed).map(c=>({
    key:'c'+c.id,color:c.color,short:(c.short||c.name),nightOk:!NIGHT_UNSAFE.has(c.id),engine:needsEngine(c),
    setup:c.sails,tagText:'',tagClass:'',
    tws:c.tws[0]+'–'+c.tws[1]+' kt',opt:c.sweet[0]+'–'+c.sweet[1]+'°',
    safe:Math.min(c.sweet[0],c.buffer[0])+'–'+Math.max(c.sweet[1],c.buffer[1])+'°'}));
}
function renderOff(){
  clearFocus();
  configs.forEach(c=>{const g=groups[c.id];g.classList.remove('match','optimal');
    g.classList.toggle('excluded',!allowed(c));});
  showPuck(false); showPuck2(false); mirror=false; hideRays();
  const l=offCards(); renderCards(l,l.length);
}
function setInteractive(v){
  interactive=v; interBtn.classList.toggle('on',v); interBtn.setAttribute('aria-pressed',v);
  if(v){ ringLayer.classList.remove('showall'); clearFocus(); showPuck2(false); mirror=false;
    showPuck(true); update(); updateRays(state.angle,false); fadeStatic([{angle:state.angle,side:1}]); updatePOS(state.angle); }
  else { ringLayer.classList.add('showall'); renderOff(); }
}
function setNight(v){
  night=v; nightBtn.classList.toggle('on',v); nightBtn.setAttribute('aria-pressed',v);
  if(interactive) update(); else renderOff();
}
interBtn.addEventListener('click',()=>setInteractive(!interactive));
nightBtn.addEventListener('click',()=>setNight(!night));
// SAILS enable/disable column — disabling a sail removes every plan that needs it
const sailsCol=document.getElementById('sailsCol');
SAILS.forEach(([k,lab])=>{
  const b=document.createElement('button');
  b.className='sailbtn on'; b.dataset.sail=k; b.textContent=lab;
  b.addEventListener('click',()=>{ sailsOn[k]=!sailsOn[k]; b.classList.toggle('on',sailsOn[k]);
    interactive?update():renderOff(); });
  sailsCol.appendChild(b);
});
// clicking the SAILS label toggles all sails: any off → turn all on, else turn all off
document.getElementById('sailsLabel').addEventListener('click',()=>{
  const target=SAILS.some(([k])=>!sailsOn[k]);
  SAILS.forEach(([k])=>sailsOn[k]=target);
  sailsCol.querySelectorAll('.sailbtn').forEach(b=>b.classList.toggle('on',sailsOn[b.dataset.sail]));
  interactive?update():renderOff();
});
cardsEl.addEventListener('pointerdown',e=>{
  const card=e.target.closest('.card.on'); if(!card) return;
  press={card,key:card.dataset.key,x:e.clientX,y:e.clientY,moved:false};
  try{cardsEl.setPointerCapture(e.pointerId);}catch(_){}
  focusCard(card); e.preventDefault();
});
cardsEl.addEventListener('pointermove',e=>{
  if(!press) return;
  if(Math.hypot(e.clientX-press.x,e.clientY-press.y)>8) press.moved=true;
  const card=cardUnder(e.clientX,e.clientY);
  if(card&&card!==press.card){press.card=card;press.key=card.dataset.key;press.moved=true;focusCard(card);}
});
cardsEl.addEventListener('pointerup',e=>{
  if(!press) return;
  const moved=press.moved,key=press.key; press=null;
  try{cardsEl.releasePointerCapture(e.pointerId);}catch(_){}
  if(!moved){ openSheet(key); return; }            // clean tap → details
  if(e.pointerType==='mouse'){const c=cardUnder(e.clientX,e.clientY);c?focusCard(c):clearFocus();}
  else clearFocus();
});
cardsEl.addEventListener('pointercancel',()=>{press=null;if(!detailWin.classList.contains('show'))clearFocus();});
cardsEl.addEventListener('pointerover',e=>{
  if(press||e.pointerType!=='mouse'||detailWin.classList.contains('show')) return;
  const card=e.target.closest('.card.on'); if(card) focusCard(card);
});
cardsEl.addEventListener('pointerout',e=>{
  if(press||e.pointerType!=='mouse'||detailWin.classList.contains('show')) return;  // keep the plan's ring isolated while the detail window is open
  const to=e.relatedTarget&&e.relatedTarget.closest?e.relatedTarget.closest('.card.on'):null;
  if(!to) clearFocus();
});

// pointer → svg coords
function toSvg(evt){
  const r=svg.getBoundingClientRect();
  return {x:(evt.clientX-r.left)*540/r.width, y:(evt.clientY-r.top)*540/r.height};
}
function setFromPoint(p){
  let dx=p.x-CX,dy=p.y-CY,dist=Math.hypot(dx,dy);
  if(dist>MAXR){dx*=MAXR/dist;dy*=MAXR/dist;dist=MAXR;}
  movePuck(CX+dx,CY+dy);
  let a=Math.abs(Math.atan2(dx,-dy)*180/Math.PI);if(a>180)a=180;
  state.angle=Math.round(a);
  state.speed=dist<=MINR?0:Math.min(MAXSPD,Math.round(MAXSPD*Math.pow((dist-MINR)/(MAXR-MINR),1/POW)));
  puckState.tws=state.speed;
  update();
  const side=dx<0?-1:1;
  updateRays(state.angle,false,side);   // ray follows the puck's side
  fadeStatic([{angle:state.angle,side}]);
  updatePOS(state.angle);
}
let dragging=false;
svg.addEventListener('pointerdown',e=>{
  if(!interactive || detailWin.classList.contains('show')) return;   // card-driven, or detail window open
  dragging=true;
  try{svg.setPointerCapture(e.pointerId);}catch(_){}
  setFromPoint(toSvg(e));e.preventDefault();
});
svg.addEventListener('pointermove',e=>{if(dragging)setFromPoint(toSvg(e));});
svg.addEventListener('pointerup',()=>dragging=false);
svg.addEventListener('pointercancel',()=>dragging=false);

placeInitial(state.angle,state.speed);
update();
updateRays(state.angle,false,1);
fadeStatic([{angle:state.angle,side:1}]);
updatePOS(state.angle);
</script>
